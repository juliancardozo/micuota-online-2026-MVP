services:
  postgres:
    image: postgres:16-alpine
    container_name: micuota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: micuota
      POSTGRES_USER: micuota
      POSTGRES_PASSWORD: micuota
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U micuota -d micuota"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    container_name: micuota-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
