[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' http://localhost:8080 https://micuota.online https://www.micuota.online; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/swagger"
  to = "/swagger.html"
  status = 200

[[redirects]]
  from = "/swagger/"
  to = "/swagger.html"
  status = 200

[[redirects]]
  from = "/swagger-ui/*"
  to = "/swagger.html"
  status = 200

[[redirects]]
  from = "/v3/api-docs"
  to = "/swagger.html"
  status = 200
