spring.application.name=micuota-mvp-backend
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/micuota;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.base-url=http://localhost:8080

# CORS para frontend estatico local / Netlify
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:4173,https://micuota.online,http://localhost:3000
