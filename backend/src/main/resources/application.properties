spring.application.name=micuota-mvp-backend
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

app.base-url=http://localhost:8080

# Integraciones externas de links de pago (si estan desactivadas, usa sandbox interno)
app.payments.external-providers-enabled=false
app.payments.stripe.secret-key=
app.payments.square.access-token=
app.payments.square.location-id=
app.payments.square.use-sandbox=true
app.payments.plexo.api-url=
app.payments.plexo.api-key=
app.crm.api-key=${APP_CRM_API_KEY:micuota-crm-dev-key}
app.crm.default-owner=${APP_CRM_DEFAULT_OWNER:ventas@micuota.online}
app.demo-seed.enabled=${APP_DEMO_SEED_ENABLED:false}

# CORS para frontend estatico local / Netlify
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:4173,https://micuota.online,http://localhost:3000
