spring.application.name=micuota-mvp-backend
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

app.base-url=http://localhost:8080

# Integraciones externas de links de pago (si estan desactivadas, usa sandbox interno)
app.payments.external-providers-enabled=false
app.payments.default-provider=${APP_PAYMENTS_DEFAULT_PROVIDER:PROMETEO}
app.payments.fallback-provider=${APP_PAYMENTS_FALLBACK_PROVIDER:MERCADOPAGO}
app.payments.stripe.secret-key=
app.payments.square.access-token=
app.payments.square.location-id=
app.payments.square.use-sandbox=true
app.payments.mercadopago.base-url=${MERCADOPAGO_BASE_URL:https://api.mercadopago.com}
app.payments.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
app.payments.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
app.payments.plexo.api-url=
app.payments.plexo.api-key=
app.crm.api-key=${APP_CRM_API_KEY:micuota-crm-dev-key}
app.crm.default-owner=${APP_CRM_DEFAULT_OWNER:ventas@micuota.online}
app.demo-seed.enabled=${APP_DEMO_SEED_ENABLED:false}
app.prometeo.enabled=${APP_PROMETEO_ENABLED:true}
app.prometeo.sandbox=${APP_PROMETEO_SANDBOX:true}
app.prometeo.base-url=${APP_PROMETEO_BASE_URL:https://account-validation.sandbox.prometeoapi.com}
app.prometeo.api-key=${APP_PROMETEO_API_KEY:}
app.prometeo.connect-timeout-ms=${APP_PROMETEO_CONNECT_TIMEOUT_MS:5000}
app.prometeo.read-timeout-ms=${APP_PROMETEO_READ_TIMEOUT_MS:15000}
app.payments.dunning.cron=${APP_PAYMENTS_DUNNING_CRON:0 */30 * * * *}
app.payments.reconciliation.cron=${APP_PAYMENTS_RECONCILIATION_CRON:0 5 2 * * *}
app.mail.ops-alert=${APP_MAIL_OPS_ALERT:}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# CORS para frontend estatico local / Netlify
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://[::1]:*,https://micuota.online,https://www.micuota.online,https://*.netlify.app
